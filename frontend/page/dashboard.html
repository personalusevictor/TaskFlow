<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>TreeCO - Dashboard</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/img/favicon/TreeCO.svg" />
    <link rel="apple-touch-icon" href="../assets/img/favicon/TreeCO.svg" />

    <!-- Styles -->
    <link rel="stylesheet" href="../css/root.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
</head>

<body>
    <!-- Barra lateral izquierda ─────────────────────── -->
    <div class="barra-superior">
        <!-- Logo -->
        <a class="logo" href="dashboard.html">
            <img src="../assets/img/favicon/TreeCO.svg" alt="TreeCO logo" class="logo-imagen" width="40" height="40"
                draggable="false" />
            <span class="logo-nombre">Tree<span>CO</span></span>
        </a>

        <nav class="navegador">
            <a class="enlace-activo" href="dashboard.html"><span class="icono">⬡</span> Dashboard</a>
            <a class="enlace" href=""><span class="icono">⚐</span> Proyectos</a>
            <a class="enlace" href=""><span class="icono">✓</span> Tareas</a>
            <a class="enlace" href=""><span class="icono">◷</span> Calendario</a>
        </nav>

        <!-- Usuario -->
        <div class="usuario" href="">
            <div class="foto-usuario">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="#000000"
                    style="--darkreader-inline-fill: var(--darkreader-background-000000, #000000);"
                    data-darkreader-inline-fill="">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier">
                        <path
                            d="m 8 1 c -1.65625 0 -3 1.34375 -3 3 s 1.34375 3 3 3 s 3 -1.34375 3 -3 s -1.34375 -3 -3 -3 z m -1.5 7 c -2.492188 0 -4.5 2.007812 -4.5 4.5 v 0.5 c 0 1.109375 0.890625 2 2 2 h 8 c 1.109375 0 2 -0.890625 2 -2 v -0.5 c 0 -2.492188 -2.007812 -4.5 -4.5 -4.5 z m 0 0"
                            fill="#ffff"
                            style="--darkreader-inline-fill: var(--darkreader-background-2e3436, #26292a);"
                            data-darkreader-inline-fill=""></path>
                    </g>
                </svg>
            </div>
            <div class="nombre-usuario">
                <h2 id="username">Username</h2>
                <button id="logout">Cerrar sesión</button>
            </div>
        </div>
        <script src="../js/dashboard.js"></script>
</body>

</html>
